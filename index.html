<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f0eee6" />
    <meta name="description" content="Apoorv Darshan — developer shipping open-source apps, practical tools, and fixes across the software stack." />
    <meta name="application-name" content="Apoorv Darshan" />
    <meta name="apple-mobile-web-app-title" content="Apoorv Darshan" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const saved = localStorage.getItem('apoorv-theme-v2')
        const dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
      })()
    </script>
    <link rel="preload" href="/fonts/newsreader-24-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/newsreader-24-semibold.woff2" as="font" type="font/woff2" crossorigin />
    <title>Apoorv Darshan — Developer</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
